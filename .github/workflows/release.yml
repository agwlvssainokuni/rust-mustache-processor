name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve and verify version
        id: resolve
        shell: bash
        run: |
          cargo_version=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [ "$tag_version" != "$cargo_version" ]; then
              echo "::error::Tag version ($tag_version) does not match Cargo.toml version ($cargo_version)"
              exit 1
            fi
          fi
          echo "version=$cargo_version" >> "$GITHUB_OUTPUT"

  test:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test

  build:
    needs: [verify-version, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${{ needs.verify-version.outputs.version }}"
          archive="mustache-${version}-${{ matrix.target }}"
          mkdir "$archive"
          cp "target/${{ matrix.target }}/release/mustache" "$archive/"
          cp README.md README.en.md LICENSE "$archive/"
          tar czf "${archive}.tar.gz" "$archive"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.verify-version.outputs.version }}"
          $archive = "mustache-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $archive
          Copy-Item "target/${{ matrix.target }}/release/mustache.exe" $archive
          Copy-Item README.md,README.en.md,LICENSE $archive
          Compress-Archive -Path $archive -DestinationPath "$archive.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mustache-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  release:
    needs: [verify-version, build]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: mustache ${{ needs.verify-version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
